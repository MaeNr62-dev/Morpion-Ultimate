name: Build Morpion Ultimate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:

  # ══════════════════════════════════════════
  # WINDOWS – .exe NSIS
  # ══════════════════════════════════════════
  build-windows:
    name: 🪟 Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npx electron-builder --win --config build/electron-builder.json
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MorpionUltimate-Windows
          path: dist/*.exe
          retention-days: 30

  # ══════════════════════════════════════════
  # LINUX – .AppImage
  # ══════════════════════════════════════════
  build-linux:
    name: 🐧 Linux (.AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npx electron-builder --linux --config build/electron-builder.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MorpionUltimate-Linux
          path: dist/*.AppImage
          retention-days: 30

  # ══════════════════════════════════════════
  # macOS – .dmg
  # ══════════════════════════════════════════
  build-macos:
    name: 🍎 macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npx electron-builder --mac --config build/electron-builder.json
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MorpionUltimate-macOS
          path: dist/*.dmg
          retention-days: 30

  # ══════════════════════════════════════════
  # ANDROID – .apk via Capacitor
  # ══════════════════════════════════════════
  build-android:
    name: 🤖 Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor
        run: |
          npm install --save-dev \
            @capacitor/cli \
            @capacitor/core \
            @capacitor/android

      - name: Init Capacitor
        run: |
          if [ ! -f "capacitor.config.json" ]; then
            npx cap init "Morpion Ultimate" "com.morpion.ultimate" --web-dir . 2>/dev/null || true
          fi

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/MorpionUltimate-debug.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MorpionUltimate-Android
          path: dist/MorpionUltimate-debug.apk
          retention-days: 30

  # ══════════════════════════════════════════
  # RELEASE – publie tout si tag vX.X.X
  # ══════════════════════════════════════════
  release:
    name: 🚀 GitHub Release
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Morpion Ultimate ${{ github.ref_name }}
          files: release-files/**/*
          body: |
            ## 🎮 Morpion Ultimate ${{ github.ref_name }}

            ### Téléchargements

            | Plateforme | Fichier |
            |-----------|---------|
            | 🪟 Windows | `MorpionUltimate-*-Setup.exe` |
            | 🐧 Linux   | `MorpionUltimate-*.AppImage` |
            | 🍎 macOS   | `MorpionUltimate-*.dmg` |
            | 🤖 Android | `MorpionUltimate-debug.apk` |

            ### Installation Android
            1. Télécharge le `.apk`
            2. Active **Sources inconnues** dans Paramètres → Sécurité
            3. Ouvre et installe

            > Build automatique par GitHub Actions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
